name: Process New .alrm Files

on:
  push:
    branches:
      - main
    paths:
      - 'alarms/*.alrm'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  process-alrm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m venv venv
          ./venv/bin/python -m pip install --upgrade pip
          ./venv/bin/pip install -r parse-alarm/requirements.txt
          ./venv/bin/pip install Pillow

      - name: Detect new alarm files
        id: detect
        run: |
          set -e
          
          # Get list of new or modified files in alarms/ directory
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            # If manually triggered, process all alarm files
            NEW_FILES=$(find alarms/ -type f -name "*.alrm" 2>/dev/null | sort || echo "")
          else
            # Get files changed in the last commit
            NEW_FILES=$(git diff --name-only --diff-filter=AM HEAD~1 HEAD | grep '^alarms/.*\.alrm$' | sort || echo "")
          fi
          
          # Only run if there are new *.alrm files
          if [ -z "$NEW_FILES" ]; then
            echo "No new alarm files detected"
            echo "has_new_alrm_files=false" >> $GITHUB_OUTPUT
          else
            echo "New alarm files detected:"
            echo "$NEW_FILES"
            echo "$NEW_FILES" > new_alarm_files.txt
            echo "has_new_alrm_files=true" >> $GITHUB_OUTPUT
          fi

      - name: Process alarm files
        if: steps.detect.outputs.has_new_alrm_files == 'true'
        run: |
          set -e
          
          # Process each new alarm file
          while IFS= read -r alrm_file; do
            if [ -f "$alrm_file" ]; then
              echo "Processing $alrm_file"
              
              # Extract filename without path and extension
              filename=$(basename "$alrm_file" .alrm)
              
              # Run parse-alarm and redirect output to markdown file
              ./venv/bin/python parse-alarm/parse-alarm.py "$alrm_file" --format markdown > "alarms/${filename}.md"
              
              echo "Created alarms/${filename}.md"
            else
              echo "Warning: File not found: $alrm_file"
            fi
          done < new_alarm_files.txt

      - name: Update README.md
        if: steps.detect.outputs.has_new_alrm_files == 'true'
        run: |
          set -e
          
          # Initialize alarms/README.md if it doesn't exist
          if [ ! -f alarms/README.md ]; then
            cat > alarms/README.md <<'EOF'
          # Alarm Configuration Reports

          This directory contains alarm configuration files and their automatically generated analysis reports.

          ## Alarm Reports

          EOF
          fi
          
          # Add or replace links for newly processed alarm files
          while IFS= read -r alrm_file; do
            if [ -f "$alrm_file" ]; then
              filename=$(basename "$alrm_file" .alrm)
              
              # Get current date (New York timezone)
              DATE=$(TZ=America/New_York date '+%Y-%m-%d %H:%M:%S')
              
              # Create new entry
              NEW_ENTRY="- [${filename}](${filename}.md) - added ${DATE}"
              
              # Check if filename already exists in alarms/README.md
              if grep -q "(${filename}.md)" alarms/README.md; then
                # Replace existing entry: remove old entry and add new one
                grep -v "(${filename}.md)" alarms/README.md > alarms/README.md.tmp
                mv alarms/README.md.tmp alarms/README.md
                echo "${NEW_ENTRY}" >> alarms/README.md
                echo "Updated ${filename} in alarms/README.md"
              else
                # Add new entry
                echo "${NEW_ENTRY}" >> alarms/README.md
                echo "Added ${filename} to alarms/README.md"
              fi
            fi
          done < new_alarm_files.txt

      - name: Commit and push changes
        if: steps.detect.outputs.has_new_alrm_files == 'true'
        run: |
          set -e
          
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add alarms/
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Generate markdown reports for new alarm files [skip ci]"
            git push
            echo "Successfully pushed changes"
          fi
