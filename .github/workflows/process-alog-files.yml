name: Process New .alog Files

on:
  push:
    branches:
      - main
    paths:
      - 'logs/*.alog'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  process-alog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m venv venv
          ./venv/bin/python -m pip install --upgrade pip
          ./venv/bin/pip install -r artisanc/requirements.txt
          ./venv/bin/pip install -r parse-alarm/requirements.txt
          ./venv/bin/pip install Pillow jq

      - name: Detect new log files
        id: detect
        run: |
          set -e
          
          # Get list of new or modified files in logs/ directory
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            # If manually triggered, process all log files
            NEW_FILES=$(find logs/ -type f -name "*.alog" 2>/dev/null | sort || echo "")
          else
            # Get files changed in the last commit
            NEW_FILES=$(git diff --name-only --diff-filter=AM HEAD~1 HEAD | grep '^logs/.*\.alog$' | sort || echo "")
          fi
          
          # Only run if there are new *.alog files
          if [ -z "$NEW_FILES" ]; then
            echo "No new log files detected"
            echo "has_new_alog_files=false" >> $GITHUB_OUTPUT
          else
            echo "New log files detected:"
            echo "$NEW_FILES"
            echo "$NEW_FILES" > new_log_files.txt
            echo "has_new_alog_files=true" >> $GITHUB_OUTPUT
          fi

      - name: Process log files
        if: steps.detect.outputs.has_new_alog_files == 'true'
        run: |
          set -e
          
          mkdir -p md
          
          # Process each new log file
          while IFS= read -r log_file; do
            if [ -f "$log_file" ]; then
              echo "Processing $log_file"
              
              # Extract filename without path and extension
              filename=$(basename "$log_file" .alog)
              
              # Run artisanc CLI and redirect output to markdown file
              ./venv/bin/python artisanc/artisanc_cli.py --metrics -o md "$log_file" > "md/${filename}.md"
              
              echo "Created md/${filename}.md"
            else
              echo "Warning: File not found: $log_file"
            fi
          done < new_log_files.txt
      

      - name: Update README.md
        if: steps.detect.outputs.has_new_alog_files == 'true'
        run: |
          set -e
          
          # Initialize README.md if it doesn't exist
          if [ ! -f md/README.md ]; then
            cat > md/README.md <<'EOF'
          # Log Analysis Reports

          This directory contains automatically generated analysis reports from log files.

          ## Reports

          EOF
          fi
          
          # Add or replace links for newly processed files
          while IFS= read -r log_file; do
            if [ -f "$log_file" ]; then
              filename=$(basename "$log_file" .alog)
              
              # Get current date
              DATE=$(date '+%Y-%m-%d %H:%M:%S')
              
              # Extract roast batch info from log file
              BATCH=$(./venv/bin/python artisanc/artisanc_cli.py --metrics -o json "$log_file" 2>/dev/null | jq -r '.roastbatch // "Unknown"' || echo "Unknown")
              
              # Build label with batch info
              LABEL="**${BATCH}** - ${filename}"
              
              # Create new entry
              NEW_ENTRY="- [${LABEL}](${filename}.md) - added ${DATE}"
              
              # Check if filename already exists in README
              if grep -q "(${filename}.md)" md/README.md; then
                # Replace existing entry: remove old entry and add new one
                grep -v "(${filename}.md)" md/README.md > md/README.md.tmp
                mv md/README.md.tmp md/README.md
                echo "${NEW_ENTRY}" >> md/README.md
                echo "Updated ${filename} in README.md"
              else
                # Add new entry
                echo "${NEW_ENTRY}" >> md/README.md
                echo "Added ${filename} to README.md"
              fi
            fi
          done < new_log_files.txt
      
      - name: Commit and push changes
        if: steps.detect.outputs.has_new_alog_files == 'true'
        run: |
          set -e
          
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add md/ --force
          git add logs/img/*.png 2>/dev/null || true
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Generate markdown reports for new log files [skip ci]"
            git push
            echo "Successfully pushed changes"
          fi

